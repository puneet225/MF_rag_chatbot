name: Daily Fund Ingestion

on:
  schedule:
    # 16:30 UTC is 10:00 PM IST
    - cron: '30 16 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.RENDER_BACKEND_URL }}" ]; then
            echo "❌ ERROR: RENDER_BACKEND_URL secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.INGEST_TOKEN }}" ]; then
            echo "❌ ERROR: INGEST_TOKEN secret is missing!"
            exit 1
          fi

      - name: Trigger Render Ingestion
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_URL }}/admin/ingest?token=${{ secrets.INGEST_TOKEN }}" \
               -H "Content-Type: application/json" \
               --fail
