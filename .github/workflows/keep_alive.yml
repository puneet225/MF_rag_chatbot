name: Keep Alive Janitor

on:
  schedule:
    # Runs every 14 minutes (just before Render's 15-min sleep timer)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Poke Render Backend
        run: |
          curl -f https://groww-mf-chatbot-qhhf.onrender.com/health || echo "Server is waking up..."
